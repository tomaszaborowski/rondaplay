<style>
        body {
            -webkit-tap-highlight-color: transparent;
            overflow-x: hidden;
        }

        .tactile-button {
            transition: transform 0.1s ease, box-shadow 0.1s ease;
            position: relative;
        }

        .tactile-button:active {
            transform: translateY(4px);
        }

        /* Teal Tactile Style */
        .btn-teal {
            background-color: #006a61; /* secondary */
            box-shadow: 0 6px 0 0 #289689; /* teal-dark */
        }
        .btn-teal:active {
            box-shadow: 0 2px 0 0 #289689;
        }

        /* Purple Tactile Style */
        .btn-purple {
            background-color: #2c0247; /* primary */
            box-shadow: 0 6px 0 0 #2a113a; /* purple-dark */
        }
        .btn-purple:active {
            box-shadow: 0 2px 0 0 #2a113a;
        }

        .floating-bg {
            background: radial-gradient(circle at top left, #431c5d 0%, #2c0247 100%);
            overflow: hidden;
        }

        .bubble {
            position: absolute;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.05);
            animation: float 20s infinite linear;
        }

        @keyframes float {
            0% { transform: translateY(110vh) scale(0.5); opacity: 0; }
            50% { opacity: 0.2; }
            100% { transform: translateY(-10vh) scale(1.2); opacity: 0; }
        }

        .glass-panel {
            backdrop-filter: blur(12px);
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>

<script>
        // Micro-interactions for input focus
        const inputs = document.querySelectorAll('input');
        inputs.forEach(input => {
            input.addEventListener('focus', () => {
                input.parentElement.parentElement.classList.add('scale-[1.02]');
                input.parentElement.parentElement.classList.add('transition-transform');
            });
            input.addEventListener('blur', () => {
                input.parentElement.parentElement.classList.remove('scale-[1.02]');
            });
        });

        // Simple button active state handler for non-tactile buttons
        const genericButtons = document.querySelectorAll('button:not(.tactile-button)');
        genericButtons.forEach(btn => {
            btn.addEventListener('mousedown', () => btn.classList.add('scale-95'));
            btn.addEventListener('mouseup', () => btn.classList.remove('scale-95'));
            btn.addEventListener('mouseleave', () => btn.classList.remove('scale-95'));
        });
    </script>
