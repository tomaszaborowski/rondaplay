<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

        .tactile-button {
            transition: transform 0.1s ease, box-shadow 0.1s ease;
        }
        
        .tactile-button:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 0 rgba(0,0,0,0.2) !important;
        }

        @keyframes rotate-phone {
            0% { transform: rotate(0deg); }
            20% { transform: rotate(0deg); }
            45% { transform: rotate(90deg); }
            70% { transform: rotate(90deg); }
            90% { transform: rotate(0deg); }
            100% { transform: rotate(0deg); }
        }

        .animate-rotate-phone {
            animation: rotate-phone 4s cubic-bezier(0.45, 0, 0.55, 1) infinite;
        }

        .bg-mesh {
            background-color: #2c0247;
            background-image: 
                radial-gradient(at 0% 0%, #431c5d 0px, transparent 50%),
                radial-gradient(at 100% 100%, #3d0019 0px, transparent 50%),
                radial-gradient(at 50% 50%, #2c0247 0px, transparent 100%);
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body class="bg-primary overflow-hidden h-screen w-full flex flex-col font-body-md text-on-primary">
<!-- Immersive Background -->
<div class="fixed inset-0 z-0 bg-mesh opacity-80"></div>
<!-- Animated background element -->
<div class="fixed inset-0 z-0 flex items-center justify-center opacity-30 pointer-events-none">

</div>
<!-- Main Content Canvas -->
<main class="relative z-10 flex-1 flex flex-col items-center justify-center px-margin-mobile">
<!-- Rotating Phone Container -->
<div class="relative mb-stack-lg">
<div class="w-64 h-64 flex items-center justify-center relative">
<!-- Outer Glow Ring -->
<div class="absolute inset-0 rounded-full border-4 border-dashed border-primary-fixed-dim/20 animate-[spin_10s_linear_infinite]"></div>
<!-- The Phone Icon -->
<div class="animate-rotate-phone flex flex-col items-center">
<div class="w-32 h-56 border-8 border-white/90 rounded-[2.5rem] relative flex items-center justify-center bg-purple-dark/80 shadow-[0_0_50px_rgba(227,181,255,0.2)]">
<div class="w-16 h-1 bg-white/20 rounded-full absolute top-6"></div>
<span class="material-symbols-outlined text-white text-6xl opacity-40">screen_rotation</span>
<div class="w-10 h-10 border-4 border-white/20 rounded-full absolute bottom-4"></div>
</div>
</div>
<!-- Rotation Arrow Path -->
<svg class="absolute -top-4 -right-4 w-72 h-72 pointer-events-none opacity-40" viewbox="0 0 100 100">
<path d="M 80,20 A 45,45 0 0 1 90,50" fill="none" stroke="white" stroke-dasharray="4 4" stroke-linecap="round" stroke-width="2"></path>
<path d="M 90,50 l -3,0 l 3,5 l 3,-5 z" fill="white"></path>
</svg>
</div>
</div>
<!-- Instructional Text -->
<div class="text-center space-y-stack-sm max-w-sm">
<h1 class="font-headline-lg-mobile text-headline-lg-mobile md:font-headline-lg md:text-headline-lg text-white drop-shadow-md">
                Rotate your phone
            </h1>
<p class="font-body-lg text-body-lg text-primary-fixed-dim/80">
                Turn your device sideways to start the game
            </p>
</div>
</main>
<!-- Bottom Actions Wrapper -->
<footer class="relative z-20 w-full px-margin-mobile pb-12 pt-6 flex flex-col gap-4 max-w-md mx-auto">
<!-- Primary Action: Flip to continue -->
<button class="tactile-button w-full h-touch-target-min bg-secondary rounded-lg font-label-lg text-label-lg text-white flex items-center justify-center gap-3 shadow-[0_6px_0_0_#289689] active:shadow-[0_2px_0_0_#289689] transform transition-all">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">screen_rotation</span>
            Flip to continue
        </button>
<!-- Secondary Action: Go back (Glassmorphic) -->
<button class="glass-panel w-full h-touch-target-min rounded-lg font-label-lg text-label-lg text-white flex items-center justify-center gap-3 transition-colors hover:bg-white/10 active:bg-white/5">
<span class="material-symbols-outlined">arrow_back</span>
            Go back
        </button>
</footer>
<!-- Atmosphere Particle Layer -->
<div class="fixed inset-0 pointer-events-none z-0">
<div class="absolute top-1/4 left-1/4 w-2 h-2 bg-secondary-fixed rounded-full blur-sm animate-pulse"></div>
<div class="absolute top-3/4 right-1/4 w-3 h-3 bg-tertiary-fixed-dim rounded-full blur-md animate-bounce"></div>
<div class="absolute bottom-1/4 left-1/2 w-1 h-1 bg-white rounded-full opacity-50"></div>
</div>
<script>
        // Micro-interaction: Subtle parallax effect on background based on device tilt (if supported)
        if (window.DeviceOrientationEvent) {
            window.addEventListener('deviceorientation', (event) => {
                const rotateX = event.beta;  // In degree in range [-180,180]
                const rotateY = event.gamma; // In degree in range [-90,90]
                
                // Limit range
                const x = Math.max(-20, Math.min(20, rotateX));
                const y = Math.max(-20, Math.min(20, rotateY));
                
                const mesh = document.querySelector('.bg-mesh');
                if (mesh) {
                    mesh.style.transform = `scale(1.1) translate(${y * 0.5}px, ${x * 0.5}px)`;
                }
            });
        }

        // Detect actual orientation change to automatically trigger "Continue" logic
        window.addEventListener("orientationchange", function() {
            if (window.orientation === 90 || window.orientation === -90) {
                // Simulate success state
                document.body.classList.add('opacity-0');
                document.body.style.transition = 'opacity 0.5s ease-out';
                setTimeout(() => {
                    console.log("Navigation triggered: Game Start");
                }, 500);
            }
        });
    </script>
</body></html>
