<style>
        body {

            touch-action: none;
            background-color: #4ade80; /* Correct Green */

        .tactile-button-green {
            background-color: #4ade80;
            box-shadow: 0 6px 0 0 #289689; /* teal-dark for block shadow */
            transition: all 0.1s ease;
        }

        .tactile-button-green:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 0 #289689;
        }

        .success-pulse {
            animation: pulse-ring 1.5s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }

        @keyframes pulse-ring {
            0% { transform: scale(0.95); opacity: 0.8; }
            50% { transform: scale(1.05); opacity: 1; }
            100% { transform: scale(0.95); opacity: 0.8; }
        }

        .particle {
            position: absolute;
            pointer-events: none;
            animation: float-up 2s ease-out forwards;
        }

        @keyframes float-up {
            to {
                transform: translateY(-150px) rotate(360deg);
                opacity: 0;
            }
        }

        .landscape-container {
            display: grid;
            grid-template-rows: auto 1fr;

<!-- Particle Script -->
<script>
        function createParticle(x, y) {
            const particle = document.createElement('div');
            particle.className = 'particle';
            
            const size = Math.random() * 12 + 8;
            const colors = ['#ffffff', '#72f5e3', '#ffd9e1', '#f4daff'];
            const color = colors[Math.floor(Math.random() * colors.length)];
            
            particle.style.width = `${size}px`;
            particle.style.height = `${size}px`;
            particle.style.backgroundColor = color;
            particle.style.left = `${x}px`;
            particle.style.top = `${y}px`;
            particle.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
            
            document.body.appendChild(particle);
            
            setTimeout(() => {
                particle.remove();
            }, 2000);
        }

        // Emit particles periodically
        setInterval(() => {
            const x = Math.random() * window.innerWidth;
            const y = window.innerHeight + 10;
            createParticle(x, y);
        }, 300);

        // Initial burst
        for(let i=0; i<20; i++) {
            setTimeout(() => {
                createParticle(window.innerWidth/2 + (Math.random()-0.5)*400, window.innerHeight/2 + (Math.random()-0.5)*200);
            }, i * 50);
        }
    </script>
