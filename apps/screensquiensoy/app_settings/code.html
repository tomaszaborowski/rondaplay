<style>

            transition: transform 0.1s ease, box-shadow 0.1s ease;

            box-shadow: 0 2px 0 0 rgba(0,0,0,0.2) !important;
        }

            box-shadow: 0 6px 0 0 #2a113a;

        .block-shadow-secondary {

        }
        .block-shadow-surface {

            backdrop-filter: blur(12px);
            background: rgba(255, 255, 255, 0.7);
        }

<body class="bg-background text-on-background font-body-md min-h-screen pb-32">
<!-- TopAppBar -->
<header class="fixed top-0 left-0 w-full z-50 bg-background dark:bg-primary px-margin-mobile py-4 flex justify-between items-center">
<button class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-surface-container-highest transition-colors">
<span class="material-symbols-outlined text-primary dark:text-inverse-primary">arrow_back</span>
</button>
<h1 class="font-headline-lg-mobile text-headline-lg-mobile text-primary dark:text-primary-fixed">¿Quién Soy?</h1>
<div class="w-10"></div> <!-- Spacer for alignment -->
</header>
<main class="mt-20 px-margin-mobile space-y-stack-lg max-w-2xl mx-auto">
<!-- Page Title & Subtitle -->
<div class="space-y-stack-sm text-center pt-4">
<h2 class="font-headline-md text-headline-md text-primary">Ajustes del Juego</h2>
<p class="font-body-md text-body-md text-on-surface-variant">Personaliza tu experiencia de fiesta</p>
</div>
<!-- Section: Gameplay -->
<section class="space-y-stack-md">
<div class="flex items-center gap-2 mb-2">
<span class="material-symbols-outlined text-secondary">videogame_asset</span>
<h3 class="font-label-lg text-label-lg uppercase tracking-wider text-outline">Partida</h3>
</div>
<!-- Game Duration Chip Selector -->
<div class="bg-surface-container rounded-xl p-6 border border-outline-variant/30 tactile-card">
<label class="block font-body-lg text-body-lg mb-4">Duración de la Partida</label>
<div class="grid grid-cols-4 gap-3">
<button class="time-chip tactile-button bg-surface-container-highest text-on-surface-variant py-3 rounded-xl font-label-lg text-label-lg block-shadow-surface border border-outline-variant/20" data-value="12" onclick="selectTime(this)">12s</button>
<button class="time-chip tactile-button bg-secondary-container text-on-secondary-container py-3 rounded-xl font-label-lg text-label-lg block-shadow-secondary border border-secondary/20" data-value="60" onclick="selectTime(this)">60s</button>
<button class="time-chip tactile-button bg-surface-container-highest text-on-surface-variant py-3 rounded-xl font-label-lg text-label-lg block-shadow-surface border border-outline-variant/20" data-value="90" onclick="selectTime(this)">90s</button>
<button class="time-chip tactile-button bg-surface-container-highest text-on-surface-variant py-3 rounded-xl font-label-lg text-label-lg block-shadow-surface border border-outline-variant/20" data-value="120" onclick="selectTime(this)">120s</button>
</div>
</div>
</section>
<!-- Section: Appearance -->
<section class="space-y-stack-md">
<div class="flex items-center gap-2 mb-2">
<span class="material-symbols-outlined text-secondary">palette</span>
<h3 class="font-label-lg text-label-lg uppercase tracking-wider text-outline">Apariencia</h3>
</div>
<!-- Dark Mode Toggle -->
<div class="bg-surface-container rounded-xl p-6 border border-outline-variant/30 flex items-center justify-between">
<div>
<span class="block font-body-lg text-body-lg">Modo Oscuro</span>
<span class="block font-label-md text-label-md text-on-surface-variant">Cambia el estilo visual</span>
</div>
<div class="flex bg-surface-container-highest p-1 rounded-xl border border-outline-variant/20 shadow-inner w-32 relative">
<button class="flex-1 py-2 font-label-lg text-label-lg rounded-lg z-10 transition-colors text-on-surface" id="dark-no" onclick="setDarkMode(false)">NO</button>
<button class="flex-1 py-2 font-label-lg text-label-lg rounded-lg z-10 transition-colors text-on-surface-variant" id="dark-yes" onclick="setDarkMode(true)">SÍ</button>
<div class="absolute left-1 top-1 w-[calc(50%-4px)] h-[calc(100%-8px)] bg-white rounded-lg shadow-sm transition-all duration-300 transform" id="mode-slider"></div>
</div>
</div>
</section>
<!-- Section: Sensory -->

</div>

</div>

</div>
<label class="relative inline-flex items-center cursor-pointer">
<input checked="" class="sr-only peer" type="checkbox"/>
<div class="w-14 h-8 bg-surface-container-highest rounded-full peer peer-checked:after:translate-x-full after:content-[''] after:absolute after:top-1 after:left-1 after:bg-white after:rounded-full after:h-6 after:w-6 after:transition-all peer-checked:bg-secondary"></div>

<span class="material-symbols-outlined">gamepad</span>
<span class="font-label-md text-label-md">Play</span>

</a>

<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">settings</span>
<span class="font-label-md text-label-md">Settings</span>

<script>
        function selectTime(btn) {
            const chips = document.querySelectorAll('.time-chip');
            chips.forEach(c => {
                c.classList.remove('bg-secondary-container', 'text-on-secondary-container', 'block-shadow-secondary');
                c.classList.add('bg-surface-container-highest', 'text-on-surface-variant', 'block-shadow-surface');
                c.style.borderColor = 'rgba(206, 195, 208, 0.2)';
            });
            
            btn.classList.add('bg-secondary-container', 'text-on-secondary-container', 'block-shadow-secondary');
            btn.classList.remove('bg-surface-container-highest', 'text-on-surface-variant', 'block-shadow-surface');
            btn.style.borderColor = 'rgba(0, 106, 97, 0.2)';
        }

        function setDarkMode(isDark) {
            const html = document.documentElement;
            const slider = document.getElementById('mode-slider');
            const yesBtn = document.getElementById('dark-yes');
            const noBtn = document.getElementById('dark-no');

            if (isDark) {
                html.classList.add('dark');
                slider.style.transform = 'translateX(100%)';
                yesBtn.classList.remove('text-on-surface-variant');
                yesBtn.classList.add('text-primary');
                noBtn.classList.add('text-on-surface-variant');
                noBtn.classList.remove('text-on-surface');
            } else {
                html.classList.remove('dark');
                slider.style.transform = 'translateX(0)';
                noBtn.classList.remove('text-on-surface-variant');
                noBtn.classList.add('text-on-surface');
                yesBtn.classList.add('text-on-surface-variant');
                yesBtn.classList.remove('text-primary');
            }
        }

        // Add micro-interaction to all tactile buttons
        document.querySelectorAll('.tactile-button').forEach(button => {
            button.addEventListener('touchstart', () => {
                // Haptic feedback simulation could go here
            });
        });
    </script>
